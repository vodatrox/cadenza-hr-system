services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cadenza_hr_frontend
    ports:
      - "3000:3000"
    environment:
      # Frontend runs in browser, so it uses localhost to reach backend
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    networks:
      - cadenza_network

networks:
  cadenza_network:
    name: cadenza_hr_network
    external: true
